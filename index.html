<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TRC Reward Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>TRC Reward Dashboard</h1>

<div class="topbar">

<div>
TRC Price
<span id="price">$0</span>
</div>

<div id="wallet">Wallet Not Connected</div>

</div>

<button onclick="connectWallet()" class="mainBtn">
Connect Wallet
</button>


<!-- TIMEFRAME -->
<div class="timeframe">

<button onclick="setFrame(30)">30M</button>
<button onclick="setFrame(60)">1H</button>
<button onclick="setFrame(240)">4H</button>
<button onclick="setFrame(1440)">1D</button>

</div>


<div class="chartBox">
<canvas id="priceChart"></canvas>
</div>


<div class="card">

<h2>View Section</h2>

<div class="grid">

<div>TRC Token<br><span id="trc"></span></div>

<div>Current Epoch<br><span id="epoch"></span></div>

<div>Downline Count<br><span id="downline"></span></div>

<div>Epoch Snapshot<br><span id="snapshot"></span></div>

<div>Epoch Start<br><span id="epochStart"></span></div>

<div>Epoch Weight<br><span id="epochWeight"></span></div>

<div>ICO Address<br><span id="ico"></span></div>

<div>Pending Reward<br><span id="pending"></span></div>

<div>Next Claim<br><span id="nextClaim"></span></div>

</div>

<button onclick="loadData()">Refresh</button>

</div>


<div class="card">

<h2>Register</h2>

<input id="ref" placeholder="Referral Address">

<button onclick="register()">Register</button>

</div>


<div class="card">

<h2>Approve TRC</h2>

<input id="approveAmount" placeholder="TRC Amount">

<button onclick="approveTRC()">Approve</button>

</div>


<div class="card">

<h2>Join Levels</h2>

<div class="grid">

<button onclick="joinLevel(1)">Level 1 ($20)</button>
<button onclick="joinLevel(2)">Level 2 ($40)</button>
<button onclick="joinLevel(3)">Level 3 ($80)</button>
<button onclick="joinLevel(4)">Level 4 ($160)</button>
<button onclick="joinLevel(5)">Level 5 ($320)</button>
<button onclick="joinLevel(6)">Level 6 ($640)</button>

</div>

</div>


<div class="card">

<h2>Claim Weekly Reward</h2>

<button onclick="claimReward()">Claim Reward</button>

</div>


<div class="card">

<h2>Transaction Status</h2>

<p id="status"></p>

</div>

</div>

<script>

let provider;
let signer;
let contract;
let token;
let user;

let timeframe=60;

const contractAddress="0xf4eE3240D8b817117b835D3a440890CA994dEBf6";
const tokenAddress="0xc08983be707bf4b763e7A0f3cCAD3fd00af6620d";


const abi=[

"function TRC() view returns(address)",
"function currentEpoch() view returns(uint256)",
"function downlineCount(address) view returns(uint256)",
"function epochRewardSnapshot() view returns(uint256)",
"function epochStart() view returns(uint256)",
"function epochTotalWeight() view returns(uint256)",
"function ico() view returns(address)",
"function pendingReward(address) view returns(uint256)",
"function getTRCPriceUSD() view returns(uint256)",

"function register(address)",
"function joinLevel1()",
"function joinLevel2()",
"function joinLevel3()",
"function joinLevel4()",
"function joinLevel5()",
"function joinLevel6()",
"function claimReward()"

];


const tokenABI=[
"function approve(address,uint256) returns(bool)"
];


let chart;
let candles=[];


function updateStatus(msg){
document.getElementById("status").innerHTML=msg;
}


function human(num){
return Number(num).toLocaleString();
}


async function connectWallet(){

await window.ethereum.request({method:'eth_requestAccounts'});

provider=new ethers.providers.Web3Provider(window.ethereum);

signer=provider.getSigner();

user=await signer.getAddress();

document.getElementById("wallet").innerText=user;

contract=new ethers.Contract(contractAddress,abi,signer);

token=new ethers.Contract(tokenAddress,tokenABI,signer);

loadData();

startChart();

}


async function loadData(){

const price=await contract.getTRCPriceUSD();

const priceUSD=(price/1e8).toFixed(4);

document.getElementById("price").innerText="$"+priceUSD;

document.getElementById("trc").innerText=await contract.TRC();

document.getElementById("epoch").innerText=human(await contract.currentEpoch());

document.getElementById("downline").innerText=human(await contract.downlineCount(user));

document.getElementById("snapshot").innerText=human(await contract.epochRewardSnapshot());

let start=await contract.epochStart();

let date=new Date(start*1000);

document.getElementById("epochStart").innerText=date.toLocaleString();

document.getElementById("epochWeight").innerText=human(await contract.epochTotalWeight());

document.getElementById("ico").innerText=await contract.ico();

document.getElementById("pending").innerText=human(await contract.pendingReward(user));

let next=new Date((start*1000)+(7*24*3600*1000));

document.getElementById("nextClaim").innerText=next.toLocaleString();

updateChart(priceUSD);

}



async function handleTx(tx){

updateStatus("Transaction Sent...");

const sent=await tx;

updateStatus(`
⏳ Pending
<br>
<a href="https://polygonscan.com/tx/${sent.hash}" target="_blank">
View Transaction
</a>
`);

const receipt=await sent.wait();

if(receipt.status==1){

updateStatus(`
✅ Confirmed
<br>
<a href="https://polygonscan.com/tx/${sent.hash}" target="_blank">
Open PolygonScan
</a>
`);

}else{

updateStatus("❌ Transaction Failed");

}

}



async function register(){

const ref=document.getElementById("ref").value;

handleTx(contract.register(ref));

}


async function approveTRC(){

const amount=document.getElementById("approveAmount").value;

const value=ethers.utils.parseUnits(amount,18);

handleTx(token.approve(contractAddress,value));

}



async function joinLevel(l){

updateStatus("Joining Level "+l);

if(l==1) handleTx(contract.joinLevel1());
if(l==2) handleTx(contract.joinLevel2());
if(l==3) handleTx(contract.joinLevel3());
if(l==4) handleTx(contract.joinLevel4());
if(l==5) handleTx(contract.joinLevel5());
if(l==6) handleTx(contract.joinLevel6());

}



async function claimReward(){

handleTx(contract.claimReward());

}



function setFrame(t){

timeframe=t;

candles=[];

}



function startChart(){

const ctx=document.getElementById('priceChart');

chart=new Chart(ctx,{

type:'bar',

data:{

labels:[],

datasets:[{

label:"TRC Price",

data:[],

backgroundColor:[]

}]

},

options:{

plugins:{legend:{display:false}},

scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}

}

});

setInterval(loadData,timeframe*1000);

}



function updateChart(price){

if(candles.length>0){

let prev=candles[candles.length-1];

let color=price>=prev?"green":"red";

chart.data.labels.push("");

chart.data.datasets[0].data.push(price);

chart.data.datasets[0].backgroundColor.push(color);

}else{

chart.data.labels.push("");

chart.data.datasets[0].data.push(price);

chart.data.datasets[0].backgroundColor.push("green");

}

candles.push(price);

if(candles.length>50){

candles.shift();

chart.data.labels.shift();

chart.data.datasets[0].data.shift();

chart.data.datasets[0].backgroundColor.shift();

}

chart.update();

}

</script>

</body>
</html>
